name: Release

# Tag a version (e.g. `v0.1.0`) to cut a release: the tag's version is checked against the workspace
# `Cargo.toml`, the `naht` CLI is built for each target, the Studio plugin is packaged as an
# installable `.rbxmx`, and everything is attached to the GitHub Release. Reproducible from the tag
# alone — no manual steps.

on:
  push:
    tags: ["v*"]

# Read-only by default. Only the jobs that upload to the GitHub Release escalate
# to `contents: write`, locally and explicitly.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Guard: a tag whose version disagrees with the workspace version fails the whole release.
  version-check:
    name: version guard
    runs-on: ubuntu-24.04
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - run: cargo run -p naht -- check-version "${GITHUB_REF_NAME}"

  binaries:
    name: build ${{ matrix.target }}
    needs: version-check
    permissions:
      contents: write # upload release assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build
        run: cargo build --release --locked -p naht --target ${{ matrix.target }}
      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/naht" "dist/naht-${{ matrix.target }}"
      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/naht.exe" "dist/naht-${{ matrix.target }}.exe"
      - name: Attach to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*

  plugin:
    name: package plugin
    needs: version-check
    permissions:
      contents: write # upload release assets
    runs-on: ubuntu-24.04
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
      - name: Package the Studio plugin
        run: cargo run -p naht -- package-plugin --src plugin/src --output naht-plugin.rbxmx
      - name: Attach to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: naht-plugin.rbxmx
