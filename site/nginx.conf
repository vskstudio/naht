# Container-internal nginx for the naht.dev SPA. Serves static files on :8080
# over the private `web` Docker network only — the edge proxy terminates TLS,
# enforces Cloudflare-origin lock-down, rate limits, and sets all the security
# response headers. This server's job is just to serve files, fast and quietly.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    # Never leak the nginx version (Server header / error pages).
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Internal health endpoint for the container HEALTHCHECK — no access noise.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Hashed build assets are content-addressed and immutable — cache hard.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA: every unknown path falls back to index.html (hash-router + deep links).
    # index.html itself must never be cached, or clients pin a stale asset map.
    location / {
        try_files $uri $uri/ /index.html;
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
